<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Mashic Music</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); }
        select option { background-color: #0A0A0A; color: white; }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans min-h-screen flex items-center justify-center py-10 overflow-x-hidden">

    <div class="fixed inset-0 overflow-hidden -z-10">
        <div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-purple-900/20 via-black to-black"></div>
    </div>

    <div class="w-full max-w-md p-6">
        <div class="glass-card rounded-[2rem] p-8 shadow-2xl border border-white/10">
            
            <div class="text-center mb-8">
                <h3 class="text-2xl font-bold tracking-tight">Únete a Mashic<span class="text-[#8b5cf6]">Music</span></h3>
                <p class="text-zinc-500 text-sm mt-2 font-light">Crea tu cuenta para empezar a escuchar</p>
            </div>

            {% if error %}
                <div class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm p-3 rounded-lg text-center mb-6">
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-5">
                    <label class="block text-zinc-400 text-xs uppercase tracking-widest mb-2 ml-1">Correo Electrónico</label>
                    <input type="email" name="correo" required 
                           class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#8b5cf6] focus:bg-black transition-colors">
                </div>
                
                <div class="mb-5">
                    <label class="block text-zinc-400 text-xs uppercase tracking-widest mb-2 ml-1">Contraseña</label>
                    <input type="password" name="password" required 
                           class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#8b5cf6] focus:bg-black transition-colors">
                </div>

                <div class="mb-5">
                    <label class="block text-zinc-400 text-xs uppercase tracking-widest mb-2 ml-1">Fecha de Nacimiento</label>
                    <input type="date" name="fecha_nacimiento" required 
                           class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-zinc-400 focus:outline-none focus:border-[#8b5cf6] focus:bg-black transition-colors">
                </div>

                <div class="mb-8">
                    <label class="block text-zinc-400 text-xs uppercase tracking-widest mb-2 ml-1">¿Cómo usarás Mashic?</label>
                    <select name="rol" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#8b5cf6] focus:bg-black transition-colors" required>
                        <option value="Oyente">Solo quiero escuchar música (Oyente)</option>
                        <option value="Artista">Quiero subir mis canciones (Artista)</option>
                    </select>
                </div>
                
                <button type="submit" class="w-full bg-[#8b5cf6] text-white font-bold uppercase tracking-widest text-sm py-3 rounded-full hover:bg-[#a855f7] hover:scale-[1.02] transition-all">
                    Crear Cuenta
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-zinc-500 text-sm">¿Ya tienes una cuenta? <a href="{% url 'iniciar_sesion' %}" class="text-[#8b5cf6] hover:text-[#a855f7] font-medium">Inicia sesión</a></p>
            </div>
            
        </div>
    </div>
</body>
</html>
