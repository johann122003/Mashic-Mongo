<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Álbum | MashicMusic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.glass-card { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); }</style>
</head>
<body class="bg-[#050505] text-white min-h-screen flex items-center justify-center overflow-x-hidden">

    <!-- Fondo de pantalla -->
    <div class="fixed inset-0 overflow-hidden -z-10">
        <div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-purple-900/20 via-black to-black"></div>
    </div>

    <div class="glass-card w-full max-w-md p-8 rounded-[2rem] border border-white/10 shadow-2xl">
        <h2 class="text-2xl font-bold mb-6 text-[#8b5cf6]">Nuevo Álbum</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-zinc-400 text-xs uppercase tracking-widest mb-2">Título del Álbum</label>
                <input type="text" name="titulo_album" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-[#8b5cf6] outline-none transition-colors" required>
            </div>
            <button type="submit" class="w-full bg-[#8b5cf6] text-white font-bold uppercase tracking-widest py-3 rounded-full hover:bg-[#a855f7] transition-colors mt-2">Guardar Álbum</button>
        </form>
    </div>
</body>
</html>
